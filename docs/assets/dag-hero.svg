<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" font-family="Georgia, serif">
  <!-- Confounding node -->
  <circle cx="260" cy="40" r="28" fill="#f0f0f0" stroke="#999" stroke-width="1.5"/>
  <text x="260" y="46" text-anchor="middle" font-size="22" fill="#999" font-style="italic">?</text>

  <!-- Treatment node -->
  <circle cx="120" cy="150" r="32" fill="#2b5797" stroke="#1a3a6b" stroke-width="2"/>
  <text x="120" y="157" text-anchor="middle" font-size="17" fill="white" font-weight="bold">D</text>

  <!-- Outcome node -->
  <circle cx="400" cy="150" r="32" fill="#2b5797" stroke="#1a3a6b" stroke-width="2"/>
  <text x="400" y="157" text-anchor="middle" font-size="17" fill="white" font-weight="bold">Y</text>

  <!-- Arrow: D → Y (the causal effect) -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2b5797"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#999"/>
    </marker>
  </defs>

  <line x1="154" y1="150" x2="365" y2="150" stroke="#2b5797" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Arrow: ? → D -->
  <line x1="240" y1="60" x2="142" y2="122" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-gray)"/>

  <!-- Arrow: ? → Y -->
  <line x1="280" y1="60" x2="378" y2="122" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-gray)"/>

  <!-- Label -->
  <text x="260" y="192" text-anchor="middle" font-size="12" fill="#666" letter-spacing="0.5">Does D cause Y — or is something else going on?</text>
</svg>
