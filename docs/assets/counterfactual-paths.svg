<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" font-family="Georgia, serif">
  <!-- The observed path -->
  <path d="M 60,120 C 120,120 140,60 200,60 L 460,60"
        stroke="#2b5797" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- The counterfactual path (dashed, faded) -->
  <path d="M 60,120 C 120,120 140,160 200,160 L 460,160"
        stroke="#2b5797" stroke-width="2.5" fill="none" stroke-dasharray="8,6"
        stroke-linecap="round" opacity="0.3"/>

  <!-- Fork point -->
  <circle cx="60" cy="120" r="6" fill="#2b5797"/>

  <!-- Observed endpoint -->
  <circle cx="460" cy="60" r="5" fill="#2b5797"/>

  <!-- Counterfactual endpoint -->
  <circle cx="460" cy="160" r="5" fill="#2b5797" opacity="0.3"/>

  <!-- Labels -->
  <text x="470" y="65" font-size="14" fill="#2b5797" font-style="italic">Y(1)</text>
  <text x="470" y="165" font-size="14" fill="#2b5797" opacity="0.35" font-style="italic">Y(0)</text>

  <text x="48" y="108" font-size="12" fill="#666" text-anchor="middle">treatment</text>
  <text x="48" y="122" font-size="12" fill="#666" text-anchor="middle">assigned</text>

  <!-- Brace / annotation for the gap -->
  <line x1="490" y1="68" x2="490" y2="152" stroke="#c0392b" stroke-width="1.5"/>
  <line x1="486" y1="68" x2="494" y2="68" stroke="#c0392b" stroke-width="1.5"/>
  <line x1="486" y1="152" x2="494" y2="152" stroke="#c0392b" stroke-width="1.5"/>
  <text x="504" y="114" font-size="13" fill="#c0392b" font-style="italic">causal</text>
  <text x="504" y="130" font-size="13" fill="#c0392b" font-style="italic">effect</text>

  <!-- Subtitle -->
  <text x="260" y="192" text-anchor="middle" font-size="12" fill="#666" letter-spacing="0.5">One path observed. One forever hidden.</text>
</svg>
