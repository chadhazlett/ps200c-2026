<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 290" font-family="Georgia, serif">

  <defs>
    <!-- Filled person silhouette -->
    <g id="person">
      <circle cx="0" cy="-32" r="9"/>
      <rect x="-10" y="-22" width="20" height="26" rx="4"/>
      <rect x="-10" y="4" width="8" height="24" rx="3"/>
      <rect x="2" y="4" width="8" height="24" rx="3"/>
      <rect x="-16" y="-20" width="7" height="22" rx="3"/>
      <rect x="9" y="-20" width="7" height="22" rx="3"/>
    </g>
    <!-- Outline-only person silhouette -->
    <g id="person-outline">
      <circle cx="0" cy="-32" r="9" fill="none" stroke-width="2"/>
      <rect x="-10" y="-22" width="20" height="26" rx="4" fill="none" stroke-width="2"/>
      <rect x="-10" y="4" width="8" height="24" rx="3" fill="none" stroke-width="2"/>
      <rect x="2" y="4" width="8" height="24" rx="3" fill="none" stroke-width="2"/>
      <rect x="-16" y="-20" width="7" height="22" rx="3" fill="none" stroke-width="2"/>
      <rect x="9" y="-20" width="7" height="22" rx="3" fill="none" stroke-width="2"/>
    </g>
  </defs>

  <!-- Center person (outline only) -->
  <g transform="translate(260, 80)" stroke="#222">
    <use href="#person-outline"/>
  </g>
  <text x="260" y="128" text-anchor="middle" font-size="15" fill="#222" font-style="italic">unit i</text>

  <!-- Forking lines -->
  <path d="M 238,135 C 210,165 140,175 115,195" stroke="#2b5797" stroke-width="2.5" fill="none"/>
  <path d="M 282,135 C 310,165 380,175 405,195" stroke="#999" stroke-width="2.5" fill="none" stroke-dasharray="6,4"/>

  <!-- Treated person (blue, filled) -->
  <g transform="translate(100, 235)">
    <use href="#person" fill="#2b5797"/>
  </g>
  <text x="100" y="282" text-anchor="middle" font-size="16" fill="#2b5797" font-style="italic">Y<tspan baseline-shift="sub" font-size="12">i</tspan>(1)</text>

  <!-- Control person (light gray, filled) -->
  <g transform="translate(420, 235)">
    <use href="#person" fill="#bbb"/>
  </g>
  <text x="420" y="282" text-anchor="middle" font-size="16" fill="#999" font-style="italic">Y<tspan baseline-shift="sub" font-size="12">i</tspan>(0)</text>

</svg>
